deployment:
  role: data_plane
  role_data_plane:
    config_provider: yaml

apisix:
  node_listen: 9080
  enable_ipv6: false

nginx_config:
  error_log: /dev/stderr
  error_log_level: warn
  http:
    access_log: /dev/stdout

plugins:
  - cors
  - proxy-rewrite
  - forward-auth
  - real-ip
  - prometheus
